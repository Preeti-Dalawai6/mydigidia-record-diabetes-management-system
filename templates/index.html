<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyDigiDia Record</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:"Segoe UI",sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;

      background:
      linear-gradient(rgba(253,247,247,0.92), rgba(253,247,247,0.92)),
      url("/static/medical-bg.jpg") center/cover no-repeat;
    }

    .card{
      width:100%;
      max-width:420px;
      padding:40px 35px;
      border-radius:18px;

      background:white;

      box-shadow:0 20px 50px rgba(123,30,43,0.18);

      text-align:center;

      border-top:6px solid #a71d31;
    }

    .logo i{
      font-size:42px;
      margin-bottom:10px;
      color:#a71d31;
    }

    .logo h1{
      font-size:28px;
      margin-bottom:8px;
      color:#641220;
      font-weight:700;
    }

    .logo p{
      font-size:14px;
      color:#666;
      margin-bottom:28px;
    }

    .btn{
      display:block;
      width:100%;

      padding:14px;

      border:none;
      border-radius:10px;

      font-size:16px;
      font-weight:600;

      cursor:pointer;
      text-decoration:none;

      transition:0.3s;
    }

    /* LOGIN BUTTON */
    .btn-login{
      background:#a71d31;
      color:white;
    }

    .btn-login:hover{
      background:#8f1728;
    }

    /* SIGNUP BUTTON */
    .btn-signup{
      background:white;
      color:#a71d31;
      border:2px solid #a71d31;
    }

    .btn-signup:hover{
      background:#fdf2f2;
    }

    .btn + .btn{
      margin-top:12px;
    }

    .or-divider{
      display:flex;
      align-items:center;
      margin:18px 0;
      font-size:13px;
      color:#888;
    }

    .or-divider::before,
    .or-divider::after{
      content:"";
      flex:1;
      height:1px;
      background:#ddd;
      margin:0 10px;
    }
  </style>
</head>

<body>

<div class="card">

  <div class="logo">
    <i class="fa-solid fa-heart-pulse"></i>

    <h1>MyDigiDia Record</h1>

    <p>Take Control Of Your Health Information</p>
  </div>

  <a href="/login" class="btn btn-login">
    Login
  </a>

  <div class="or-divider">OR</div>

  <a href="/signup" class="btn btn-signup">
    Sign Up
  </a>

</div>

</body>
</html>
